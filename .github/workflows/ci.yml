name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on:
      - self-hosted
      - linux
      - x64
      - node22
      - uniauth
      - ci
    timeout-minutes: 20
    defaults:
      run:
        working-directory: uniauth-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: uniauth-core
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: uniauth-core/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Check
        run: npm run check
