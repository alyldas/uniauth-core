name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish as a dry run.
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on:
      - self-hosted
      - linux
      - x64
      - node22
      - uniauth
      - release
    timeout-minutes: 20
    defaults:
      run:
        working-directory: uniauth-core
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: uniauth-core
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: uniauth-core/package-lock.json
          registry-url: https://npm.pkg.github.com
          scope: '@alyldas'
      - name: Install dependencies
        run: npm ci
      - name: Check
        run: npm run check
      - name: Publish dry run
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
